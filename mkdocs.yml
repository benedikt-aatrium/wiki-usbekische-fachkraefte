site_name: AATRIUM Wiki – Usbekische Fachkräfte in Deutschland
site_url: https://benedikt-aatrium.github.io/wiki-usbekische-fachkraefte/
site_description: Wiki zur Einreise, Anerkennung und Beschäftigung usbekischer Fachkräfte in Deutschland
site_author: AATRIUM

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code
  - admonition

nav:
  - Start: index.md
  - 01 Gesamtablauf: 01_gesamtablauf.md
  - 02 Arbeitsvertrag & Zulassung: 02_arbeitsvertrag_zulassung.md
  - 03 Visum: 03_visum.md
  - 04 Berufliche Anerkennung: 04_berufliche_anerkennung.md
  - 05 Usbekische Dokumente: 05_usbekische_dokumente.md
  - 06 Checklisten: 06_checklisten.md
  - 07 ZAV/BA-Zustimmung: 07_zav_ba_zustimmung.md
  - 08 Onboarding Deutschland: 08_onboarding_deutschland.md
  - 09 Sprache & Integrationskurs: 09_sprache_integrationskurs.md
  - 10 IHK FOSA vs. HWK: 10_ihk_fosa_vs_hwk.md
  - 11 Kostenübersicht: 11_kostenuebersicht.md
  - 12 Usbekische Arbeitsbücher: 12_usbekische_arbeitsbuecher.md
  - 13 Arbeitgeber-Checkliste: 13_arbeitgeber_checkliste.md
  - 14 Familiennachzug: 14_familiennachzug.md
  - 15 Häufige Fehler: 15_haeufige_fehler.md
  - 16 Rechtssicherheit Arbeitgeber: 16_rechtssicherheit_arbeitgeber.md
  - Quellen: 99_quellen.md
