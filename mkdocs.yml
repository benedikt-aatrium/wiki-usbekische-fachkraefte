site_name: AATRIUM Wiki – Usbekische Fachkräfte in Deutschland
site_url: https://benedikt-aatrium.github.io/wiki-usbekische-fachkraefte/
site_description: Wiki zur Einreise, Anerkennung und Beschäftigung usbekischer Fachkräfte in Deutschland
site_author: AATRIUM

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code
  - admonition

nav:
  - Start: index.md
  - Grundlagen und Ablauf:
    - 01 Gesamtablauf: 01_gesamtablauf.md
    - 02 Arbeitsvertrag & Zulassung: 02_arbeitsvertrag_zulassung.md
